<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden Patterns &amp; Metrics</title>
<style>
  :root {
    --soil: #4a3728;
    --bark: #6b5544;
    --leaf: #4d6b4f;
    --leaf-light: #7a9c7d;
    --sand: #e8ddc9;
    --sand-light: #f5f0e4;
    --clay: #b5754f;
    --danger: #a3492f;
    --paper: #fffdf9;
    --ink: #2e2620;
    --ink-soft: #6b5f52;
    --dry: #a3492f;
    --moist: #4d6b4f;
    --wet: #3b6a8a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--sand-light);
    color: var(--ink);
    font-family: 'Georgia', 'Iowan Old Style', serif;
    padding: 0 0 50px 0;
  }

  header {
    background: var(--soil);
    color: var(--sand-light);
    padding: 26px 20px 20px 20px;
    text-align: center;
    border-bottom: 4px solid var(--clay);
  }

  header .eyebrow {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--leaf-light);
    margin-bottom: 6px;
  }

  header h1 { margin: 0; font-size: 24px; font-weight: 400; }

  header .sub {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12.5px;
    color: var(--sand);
    margin-top: 8px;
    opacity: 0.9;
  }

  .nav-link {
    display: inline-block;
    margin-top: 12px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--leaf-light);
    text-decoration: none;
    border: 1px solid var(--leaf-light);
    border-radius: 20px;
    padding: 6px 14px;
  }

  .empty-state {
    margin: 30px 16px;
    background: var(--paper);
    border: 1px dashed var(--sand);
    border-radius: 10px;
    padding: 24px 20px;
    text-align: center;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--ink-soft);
    font-size: 13.5px;
    line-height: 1.6;
  }

  h2.section-title {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 26px 16px 10px 16px;
  }

  .overview-strip {
    display: flex;
    gap: 8px;
    margin: 16px 16px 0 16px;
  }

  .overview-card {
    flex: 1;
    background: var(--paper);
    border: 1px solid var(--sand);
    border-radius: 10px;
    padding: 12px 10px;
    text-align: center;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }

  .overview-num {
    font-size: 20px;
    font-weight: 700;
    color: var(--soil);
  }

  .overview-label {
    font-size: 10px;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-top: 2px;
  }

  .card {
    margin: 0 16px 12px 16px;
    background: var(--paper);
    border: 1px solid var(--sand);
    border-radius: 10px;
    overflow: hidden;
  }

  .card-inner { padding: 14px 16px; }

  .plant-row {
    margin-bottom: 12px;
  }

  .plant-row:last-child { margin-bottom: 0; }

  .plant-row-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    margin-bottom: 5px;
  }

  .plant-row-name {
    font-size: 13.5px;
    font-weight: 700;
    color: var(--soil);
  }

  .plant-row-count {
    font-size: 10.5px;
    color: var(--ink-soft);
  }

  .bar-track {
    display: flex;
    height: 14px;
    border-radius: 7px;
    overflow: hidden;
    background: var(--sand);
  }

  .bar-seg { height: 100%; }
  .bar-seg.dry { background: var(--dry); }
  .bar-seg.moist { background: var(--moist); }
  .bar-seg.wet { background: var(--wet); }

  .bar-legend {
    display: flex;
    gap: 12px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 10px;
    color: var(--ink-soft);
    margin: 4px 16px 14px 16px;
  }

  .bar-legend span { display: flex; align-items: center; gap: 4px; }

  .legend-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }
  .legend-dot.dry { background: var(--dry); }
  .legend-dot.moist { background: var(--moist); }
  .legend-dot.wet { background: var(--wet); }

  .risk-alert {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12.5px;
    line-height: 1.5;
    padding: 10px 12px;
    border-radius: 6px;
    margin-bottom: 10px;
  }

  .risk-alert:last-child { margin-bottom: 0; }
  .risk-alert.warn { background: #f0d3c8; color: var(--danger); }
  .risk-alert.ok { background: #dfe9df; color: var(--leaf); }

  .streak-item {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    padding: 8px 0;
    border-bottom: 1px solid var(--sand);
    display: flex;
    justify-content: space-between;
  }

  .streak-item:last-child { border-bottom: none; }
  .streak-count { font-weight: 700; color: var(--danger); }

  .taper-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    padding: 9px 0;
    border-bottom: 1px solid var(--sand);
  }

  .taper-row:last-child { border-bottom: none; }

  .taper-name { font-weight: 700; color: var(--soil); }
  .taper-days { font-size: 10.5px; color: var(--ink-soft); }

  .taper-stage {
    font-size: 10.5px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .stage-2x { background: #f0d3c8; color: var(--danger); }
  .stage-1x { background: #f0e2c8; color: var(--clay); }
  .stage-eod { background: #d8e6ef; color: var(--wet); }
  .stage-established { background: #dfe9df; color: var(--leaf); }

  .rain-stat-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    padding: 7px 0;
    border-bottom: 1px solid var(--sand);
  }
  .rain-stat-row:last-child { border-bottom: none; }
  .rain-stat-label { color: var(--ink-soft); }
  .rain-stat-value { font-weight: 700; color: var(--soil); }

  .footer-note {
    margin: 20px 16px 0 16px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11.5px;
    color: var(--ink-soft);
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">North Tampa &middot; Patterns Dashboard</div>
  <h1>Garden Patterns</h1>
  <div class="sub">Trends pulled from every saved moisture check</div>
  <a class="nav-link" href="moisture-check-guide.html">&larr; Back to Moisture Check</a>
</header>

<div id="app"></div>

<script>
  const HISTORY_KEY = 'gardenMoistureHistory';
  const ZONE_NAMES = ['dry', 'moist', 'wet'];

  const PLANT_LABELS = {
    firebush: 'Firebush', blueberries: 'Blueberries', pentas: 'Pentas',
    bluedaze: 'Blue Daze', coontie: 'Coontie', monkeygrass: 'Monkey Grass',
    firespike: 'Firespike Cutting'
  };

  const SEPARATE_TRACK = { blueberries: true, coontie: true };

  // Planting dates used to auto-compute taper stage (edit here if dates change)
  const PLANT_DATES = {
    firebush: '2026-07-10', blueberries: '2026-07-10', pentas: '2026-07-11',
    bluedaze: '2026-07-11', coontie: '2026-07-11', monkeygrass: '2026-07-12',
    firespike: '2026-07-11'
  };

  function loadHistory() {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  }

  function daysSince(dateStr) {
    const then = new Date(dateStr + 'T00:00:00');
    const now = new Date();
    return Math.floor((now - then) / 86400000);
  }

  function taperStage(days) {
    if (days <= 7) return { label: '2x/day check', cls: 'stage-2x' };
    if (days <= 14) return { label: '1x/day check', cls: 'stage-1x' };
    if (days <= 28) return { label: 'Every other day', cls: 'stage-eod' };
    return { label: 'Established, spot check', cls: 'stage-established' };
  }

  function render() {
    const history = loadHistory();
    const app = document.getElementById('app');

    if (history.length === 0) {
      app.innerHTML =
        '<div class="empty-state">No history yet. Log a few moisture checks on the main page and hit ' +
        '&ldquo;Save &amp; Reset for Next Check&rdquo; &mdash; patterns will show up here once there\u2019s data to work with.</div>';
      return;
    }

    // sort newest first (defensive, history is already unshifted newest-first)
    const sorted = [...history].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    const oldest = sorted[sorted.length - 1];
    const newest = sorted[0];

    let html = '';

    // --- Overview strip ---
    html += '<div class="overview-strip">';
    html += overviewCard(sorted.length, 'Sessions Logged');
    const spanDays = oldest.timestamp ? Math.max(1, Math.ceil((Date.now() - oldest.timestamp) / 86400000)) : sorted.length;
    html += overviewCard(spanDays, 'Days Tracked');
    const rainDays = sorted.filter(s => s.rainOccurred).length;
    html += overviewCard(rainDays, 'Rain Days');
    html += '</div>';

    // --- Per-plant dryness rate ---
    const plantStats = computePlantStats(sorted);
    html += '<h2 class="section-title">Dryness Rate by Plant</h2>';
    html += '<div class="card"><div class="card-inner">';
    if (Object.keys(plantStats).length === 0) {
      html += '<div class="risk-alert ok">Not enough structured reading data yet &mdash; keep logging and this fills in automatically.</div>';
    } else {
      Object.keys(plantStats).forEach(plant => {
        const s = plantStats[plant];
        const total = s.dry + s.moist + s.wet;
        if (total === 0) return;
        const pDry = Math.round((s.dry / total) * 100);
        const pMoist = Math.round((s.moist / total) * 100);
        const pWet = 100 - pDry - pMoist;
        html += '<div class="plant-row">';
        html += '<div class="plant-row-head"><span class="plant-row-name">' + (PLANT_LABELS[plant] || plant) + '</span>';
        html += '<span class="plant-row-count">' + total + ' reads &middot; ' + pDry + '% dry</span></div>';
        html += '<div class="bar-track">';
        if (pDry) html += '<div class="bar-seg dry" style="width:' + pDry + '%"></div>';
        if (pMoist) html += '<div class="bar-seg moist" style="width:' + pMoist + '%"></div>';
        if (pWet) html += '<div class="bar-seg wet" style="width:' + pWet + '%"></div>';
        html += '</div></div>';
      });
    }
    html += '</div></div>';
    html += '<div class="bar-legend"><span><i class="legend-dot dry"></i>Dry</span><span><i class="legend-dot moist"></i>Moist</span><span><i class="legend-dot wet"></i>Wet</span></div>';

    // --- High-risk watch ---
    html += '<h2 class="section-title">High-Risk Watch</h2>';
    html += '<div class="card"><div class="card-inner">';
    ['blueberries', 'coontie'].forEach(plant => {
      const s = plantStats[plant];
      const total = s ? s.dry + s.moist + s.wet : 0;
      if (total === 0) {
        html += '<div class="risk-alert ok">' + PLANT_LABELS[plant] + ': no structured reads logged yet.</div>';
        return;
      }
      const pDry = Math.round((s.dry / total) * 100);
      const cls = pDry >= 40 ? 'warn' : 'ok';
      const msg = pDry >= 40
        ? PLANT_LABELS[plant] + ' has read dry in ' + pDry + '% of checks (' + s.dry + '/' + total + ') \u2014 worth a closer look at pocket size or mulch depth.'
        : PLANT_LABELS[plant] + ' reads dry only ' + pDry + '% of the time (' + s.dry + '/' + total + ') \u2014 tracking normally.';
      html += '<div class="risk-alert ' + cls + '">' + msg + '</div>';
    });
    html += '</div></div>';

    // --- Consecutive dry streaks ---
    const streaks = computeStreaks(sorted);
    html += '<h2 class="section-title">Current Dry Streaks (2+ in a row)</h2>';
    html += '<div class="card"><div class="card-inner">';
    if (streaks.length === 0) {
      html += '<div class="risk-alert ok">Nothing currently on a dry streak.</div>';
    } else {
      streaks.forEach(st => {
        html += '<div class="streak-item"><span>' + st.label + '</span><span class="streak-count">' + st.count + ' checks dry</span></div>';
      });
    }
    html += '</div></div>';

    // --- Rain summary ---
    const rainStats = computeRainStats(sorted);
    html += '<h2 class="section-title">Rain Summary</h2>';
    html += '<div class="card"><div class="card-inner">';
    html += rainStatRow('Total rain events', rainStats.totalEvents);
    html += rainStatRow('Light / Moderate / Heavy', rainStats.light + ' / ' + rainStats.moderate + ' / ' + rainStats.heavy);
    html += rainStatRow('Days since last rain', rainStats.daysSinceLastRain === null ? 'No rain logged yet' : rainStats.daysSinceLastRain);
    html += '</div></div>';

    // --- Taper tracker ---
    html += '<h2 class="section-title">Watering Taper Tracker</h2>';
    html += '<div class="card"><div class="card-inner">';
    Object.keys(PLANT_DATES).forEach(plant => {
      const days = daysSince(PLANT_DATES[plant]);
      const stage = taperStage(days);
      html += '<div class="taper-row">';
      html += '<div><div class="taper-name">' + (PLANT_LABELS[plant] || plant) + '</div><div class="taper-days">day ' + days + '</div></div>';
      html += '<span class="taper-stage ' + stage.cls + '">' + stage.label + '</span>';
      html += '</div>';
    });
    html += '</div></div>';

    html += '<div class="footer-note">Based on ' + sorted.length + ' saved session' + (sorted.length === 1 ? '' : 's') + ', most recent: ' + newest.label + '.</div>';

    app.innerHTML = html;
  }

  function overviewCard(num, label) {
    return '<div class="overview-card"><div class="overview-num">' + num + '</div><div class="overview-label">' + label + '</div></div>';
  }

  function rainStatRow(label, value) {
    return '<div class="rain-stat-row"><span class="rain-stat-label">' + label + '</span><span class="rain-stat-value">' + value + '</span></div>';
  }

  function computePlantStats(sorted) {
    const stats = {};
    sorted.forEach(entry => {
      if (!entry.raw) return;
      Object.values(entry.raw).forEach(r => {
        if (!stats[r.plant]) stats[r.plant] = { dry: 0, moist: 0, wet: 0 };
        if (r.zone === 0) stats[r.plant].dry++;
        else if (r.zone === 1) stats[r.plant].moist++;
        else if (r.zone === 2) stats[r.plant].wet++;
      });
    });
    return stats;
  }

  function computeStreaks(sorted) {
    // sorted is newest-first; walk oldest-to-newest per instance key to find current trailing dry streak
    const chronological = [...sorted].reverse();
    const perKey = {};
    chronological.forEach(entry => {
      if (!entry.raw) return;
      Object.keys(entry.raw).forEach(key => {
        if (!perKey[key]) perKey[key] = [];
        perKey[key].push(entry.raw[key]);
      });
    });
    const streaks = [];
    Object.keys(perKey).forEach(key => {
      const reads = perKey[key];
      let count = 0;
      for (let i = reads.length - 1; i >= 0; i--) {
        if (reads[i].zone === 0) count++;
        else break;
      }
      if (count >= 2) {
        const last = reads[reads.length - 1];
        streaks.push({ label: (PLANT_LABELS[last.plant] || last.plant) + ' ' + last.label, count });
      }
    });
    return streaks.sort((a, b) => b.count - a.count);
  }

  function computeRainStats(sorted) {
    let totalEvents = 0, light = 0, moderate = 0, heavy = 0;
    let lastRainTimestamp = null;
    sorted.forEach(entry => {
      if (entry.rainOccurred && entry.rainEvents && entry.rainEvents.length) {
        if (lastRainTimestamp === null && entry.timestamp) lastRainTimestamp = entry.timestamp;
        entry.rainEvents.forEach(ev => {
          totalEvents++;
          if (ev.intensity === 'Light') light++;
          else if (ev.intensity === 'Moderate') moderate++;
          else if (ev.intensity === 'Heavy') heavy++;
        });
      }
    });
    const daysSinceLastRain = lastRainTimestamp ? Math.floor((Date.now() - lastRainTimestamp) / 86400000) : null;
    return { totalEvents, light, moderate, heavy, daysSinceLastRain };
  }

  render();
</script>

</body>
</html>
